<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>FingT | Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-wrapper">
    <header class="app-header">
      <div class="logo">
        <img src="Fing_T_Logo.png" alt="FingT Logo" class="logo-img">
      </div>
      <nav class="main-nav">
        <a href="index.html" class="nav-link active">Home</a>
        <a href="piano.html" class="nav-link">Piano</a>
        <a href="flute.html" class="nav-link">Flute</a>
        <a href="advanced.html" class="nav-link">Advanced</a>
        <a href="rhythm.html" class="nav-link">Rhythm</a>
        <a href="settings.html" class="nav-link">Settings</a>
      </nav>
    </header>

    <main class="trainer-container">
      <h1 class="mode-title">🎵 Home | 4 Keys | Train Muscle Memory </h1>

      <!-- Sequence Builder Area -->
      <section class="sequence-section card">
        <div class="section-header">
          <h2>Your Sequence</h2>
          <div class="sequence-actions">
            <button id="clearSeqBtn" class="btn-secondary" aria-label="Clear sequence">Clear</button>
            <button id="removeLastBtn" class="btn-secondary" aria-label="Remove last">↩️</button>
          </div>
        </div>
        <div id="sequenceDisplay" class="sequence-display">
          <!-- Sequence chips will appear here -->
        </div>
        <p class="hint">Click keys below to build your sequence</p>
      </section>

      <!-- Keypad -->
      <section class="keypad-section">
        <div id="keypadContainer" class="keypad-grid">
          <!-- Dynamically populated with 4 keys -->
        </div>
      </section>

      <!-- Training Controls & Timer -->
      <section class="training-panel card">
        <div class="timer-area">
          <span class="timer-label">⏱️</span>
          <span id="timerDisplay" class="timer-value">00.0 s</span>
        </div>
        <div class="progress-container">
          <div id="progressBar" class="progress-bar" style="width: 0%;"></div>
        </div>
        <div class="control-group">
          <button id="startBtn" class="btn-primary">▶ Start</button>
          <button id="resetBtn" class="btn-secondary">↻ Reset</button>
        </div>
        <div id="stateMessage" class="state-message"></div>
      </section>
    </main>

    <footer class="app-footer">
      <span>Made for musicians | Idea And Design By Krushna</span>
    </footer>
  </div>

  <!-- Modal Popup (hidden by default) -->
  <div id="popupModal" class="modal-overlay" style="display: none;">
    <div class="modal-card">
      <p id="popupMessage"></p>
      <button id="popupCloseBtn" class="btn-primary">OK</button>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // Page-specific initialization: Home mode (4 keys, no special sound)
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof FingT !== 'undefined') {
        FingT.init({
          mode: 'home',
          keyCount: 4,
          soundType: null,        // no sound in home mode
          predefined: null
        });
      } else {
        console.error('FingT core not loaded');
      }
    });
  </script>
</body>
</html>
